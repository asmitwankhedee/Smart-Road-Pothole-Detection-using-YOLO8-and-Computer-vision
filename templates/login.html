<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RoadVision AI</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            width: 100%;
        }

        .login-section {
            max-width: 450px;
            width: 100%;
            padding: 3rem 2.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .message-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .success-text {
            color: var(--accent-color);
        }

        .error-text {
            color: var(--danger);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">RoadVision<span>AI</span></div>
            <p>Secure Portal Login</p>
        </header>

        <main class="login-wrapper">
            <section class="login-section glass-panel">
                <form id="loginForm">
                    <div id="step1">
                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" class="glass-input"
                                placeholder="yourmail@domain.com" required>
                        </div>
                        <div class="input-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" class="glass-input"
                                placeholder="••••••••" required>
                        </div>
                        <button type="button" id="sendOtpBtn" class="primary-btn mt-4">Send Verification OTP</button>
                    </div>

                    <div id="step2" class="hidden">
                        <div class="input-group mt-4">
                            <label for="otp">Enter 6-Digit OTP</label>
                            <input type="text" id="otp" name="otp" class="glass-input" maxlength="6" pattern="\d{6}"
                                placeholder="123456">
                            <p class="settings-hint">Check your email inbox for the verification code.</p>
                        </div>
                        <button type="submit" id="loginBtn" class="primary-btn mt-4">Verify & Login</button>
                    </div>
                    <div id="loginMessage" class="message-text" style="text-align: center;"></div>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; POTHOLES AND CRACKS DETECTOR. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>

</html>
